name: FisioClinEx — Fila sombra

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fisioclinex-instagram-scheduled-shadow
  cancel-in-progress: false

jobs:
  shadow:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout read-only
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Inspect queue in shadow mode
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        shell: bash
        run: |
          set -euo pipefail
          python automation/run_shadow_queue.py
